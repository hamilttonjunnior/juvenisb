<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Volei Pro - Juvenis B - Hamilton Jr</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b101d; --card: rgba(30, 41, 59, 0.7); --primary: #38bdf8; --accent: #f43f5e; --success: #22c55e; --warning: #f1c40f; --white: #f8fafc; --border: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: var(--white); margin: 0; padding-bottom: 110px; overflow-x: hidden; }
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 3000; }
        .login-box { background: var(--card); backdrop-filter: blur(20px); padding: 35px; border-radius: 28px; border: 1px solid var(--border); text-align: center; width: 85%; max-width: 320px; }
        .login-box input { width: 100%; padding: 14px; margin: 20px 0; border-radius: 12px; border: 1px solid var(--border); background: #1e293b; color: white; text-align: center; box-sizing: border-box; font-size: 16px; }
        header { padding: 15px; text-align: center; }
        header h1 { margin: 0; font-size: 1rem; font-weight: 800; color: var(--primary); }
        .nav-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 95%; max-width: 450px; background: rgba(30, 41, 59, 0.95); display: flex; padding: 6px; border-radius: 20px; border: 1px solid var(--border); z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .nav-item { flex: 1; padding: 10px; text-align: center; font-size: 0.65rem; font-weight: 700; color: #64748b; cursor: pointer; border-radius: 15px; transition: 0.3s; }
        .nav-item.active { background: var(--primary); color: var(--bg); }
        .section { display: none; padding: 10px; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .game-info-card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 18px; margin-bottom: 20px; max-width: 500px; margin: 0 auto 20px; }
        .game-info-card input, .game-info-card select { width: 100%; padding: 10px; margin: 5px 0 12px; border-radius: 8px; border: 1px solid var(--border); background: #1e293b; color: white; font-size: 0.85rem; box-sizing: border-box; }
        .game-info-card label { font-size: 0.65rem; font-weight: 700; color: var(--primary); text-transform: uppercase; }
        #athlete-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; max-width: 900px; margin: 0 auto; }
        .athlete-card { background: var(--card); border: 1px solid var(--border); padding: 8px 12px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .athlete-num { background: var(--primary); color: var(--bg); font-weight: 800; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 0.75rem; }
        .btn-whatsapp { background: var(--success); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 5px; }
        .btn-remove { background: none; border: none; color: var(--accent); cursor: pointer; font-weight: bold; padding: 0 5px; }
        .role-select { background: #1e293b; color: var(--primary); border: none; font-size: 0.6rem; font-weight: bold; border-radius: 4px; padding: 2px; }
        #sets-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; padding: 10px; }
        .set-mini-court { background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 12px; border-radius: 18px; }
        .court-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .pos-box { background: var(--card); padding: 6px 2px; border-radius: 8px; text-align: center; }
        select { background: transparent; color: var(--white); border: none; font-size: 1rem; font-weight: 800; width: 100%; text-align: center; outline: none; }
        option { background-color: #1e293b; color: white; }
        .msg-regra { font-size: 0.65rem; margin-top: 10px; border-top: 1px solid var(--border); padding-top: 8px; }
        .scoreboard { display: flex; justify-content: space-around; align-items: center; background: var(--card); padding: 15px; border-radius: 20px; margin-bottom: 20px; border: 1px solid var(--border); max-width: 400px; margin: 0 auto 20px; }
        .score-num { font-size: 2.5rem; font-weight: 800; color: var(--primary); display: block; cursor: pointer; }
        .score-btn { background: var(--primary); color: var(--bg); border: none; padding: 12px; border-radius: 10px; font-weight: 800; width: 100%; margin-top: 10px; }
        .score-btn.adv { background: var(--accent); color: white; }
        .live-court { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; background: #1e3a8a; padding: 25px; border-radius: 15px; border: 2px solid white; max-width: 320px; margin: 0 auto; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .live-pos { background: rgba(255,255,255,0.15); aspect-ratio: 1; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 800; font-size: 1.2rem; border: 1px solid rgba(255,255,255,0.4); position: relative; }
        .pos-label { font-size: 0.55rem; color: #cbd5e1; position: absolute; top: 6px; font-weight: 700; }
        .server-ball { width: 14px; height: 14px; background: #fbbf24; border-radius: 50%; position: absolute; bottom: -6px; animation: bounce 0.6s infinite alternate; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }
        .switch { width: 36px; height: 20px; background: #334155; border-radius: 20px; position: relative; appearance: none; cursor: pointer; }
        .switch:checked { background: var(--success); }
        .switch::before { content: ''; position: absolute; width: 14px; height: 14px; background: white; border-radius: 50%; top: 3px; left: 3px; transition: 0.2s; }
        .switch:checked::before { left: 19px; }
        .tactic-hint { background: #0f172a; border: 1px solid var(--primary); padding: 15px; border-radius: 15px; max-width: 400px; margin: 20px auto; text-align: center; }
        .log-item { background: var(--card); padding: 12px; border-radius: 12px; margin-bottom: 8px; border-left: 4px solid var(--primary); font-size: 0.85rem; }
        /* Scout Styles */
        .scout-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .action-group { background: #1e293b; padding: 10px; border-radius: 8px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .btn-plus { background: var(--success); border: none; padding: 10px; border-radius: 5px; color: white; font-weight: bold; }
        .btn-minus { background: var(--accent); border: none; padding: 10px; border-radius: 5px; color: white; font-weight: bold; }
        .btn-ace { background: var(--primary); border: none; padding: 10px; border-radius: 5px; color: var(--bg); font-weight: bold; }
        .btn-neutral { background: #64748b; border: none; padding: 10px; border-radius: 5px; color: white; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 10px; color: black; }
        th, td { border: 1px solid #ddd; padding: 5px; text-align: center; background: white; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h1 style="color: var(--primary); margin:0;">VOLEI PRO</h1>
        <input type="password" id="passInput" placeholder="Senha">
        <button onclick="checkPass()" style="width:100%; padding:14px; border-radius:12px; border:none; background:var(--primary); color:var(--bg); font-weight:800;">ENTRAR</button>
    </div>
</div>

<header>
    <h1 id="main-header-title">Juvenis B - GESTÃO</h1>
    <div id="sync-status" style="display:none; font-size: 0.5rem; color: var(--success); text-align: center;">● LIVE SYNC</div>
</header>

<div class="nav-bar">
    <div class="nav-item active" id="btn-convocacao" onclick="showTab('convocacao')">CONVOCAR</div>
    <div class="nav-item" id="btn-sets" onclick="showTab('sets')">QUADRA</div>
    <div class="nav-item" id="btn-live" onclick="showTab('live')">LIVE</div>
    <div class="nav-item" id="btn-scout" onclick="showTab('scout')">SCOUT</div>
    <div class="nav-item" id="btn-logs" onclick="showTab('logs')">LOGS</div>
</div>

<!-- ABAS ORIGINAIS (CONVOCACAO, SETS, LIVE, LOGS) -->
<section id="convocacao" class="section active">
    <div class="game-info-card">
        <label>Nome do Adversário</label>
        <input type="text" id="adv-name" onchange="sync()">
        <button class="btn-whatsapp" onclick="gerarMensagem()">Copiar WhatsApp</button>
    </div>
    <div id="athlete-list"></div>
</section>

<section id="sets" class="section"><div id="sets-container"></div></section>
<section id="live" class="section"><div class="scoreboard">...</div><div class="live-court" id="live-court-render"></div></section>

<!-- NOVA ABA SCOUT -->
<section id="scout" class="section">
    <h3 id="atleta-selecionada-nome" style="text-align: center; color: var(--primary);">Selecione uma atleta</h3>
    <div id="lista-atletas-scout" style="display:flex; overflow-x:auto; gap:10px; padding:10px; background:var(--card); border-radius:12px;"></div>
    
    <div class="scout-panel">
        <div class="action-group"><label style="color:var(--warning)">SERVIÇO</label>
            <div class="btn-grid"><button class="btn-plus" onclick="track('s+')">+</button><button class="btn-minus" onclick="track('s-')">-</button><button class="btn-ace" onclick="track('ace')">ACE</button></div>
        </div>
        <div class="action-group"><label style="color:var(--warning)">ATAQUE</label>
            <div class="btn-grid"><button class="btn-plus" onclick="track('atk+')">PONTO</button><button class="btn-minus" onclick="track('atk-')">ERRO</button></div>
        </div>
    </div>
    <table id="stats-table">
        <thead><tr><th>Atleta</th><th>S+</th><th>S-</th><th>ACE</th><th>Atk+</th><th>Atk-</th></tr></thead>
        <tbody id="stats-body"></tbody>
    </table>
</section>

<section id="logs" class="section"><div id="logs-container"></div></section>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { /* SUAS CREDENCIAIS AQUI */ };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let state = { conv: [], sets: {}, advName: "ADV", logs: [], atletas: [], roles: {}, estats: {} };
    let liveState = { home: 0, away: 0, serving: 'home', currentSet: "1" };
    let selectedAtleta = null;

    onSnapshot(doc(db, "gestao", "atual"), (snap) => {
        if(snap.exists()) { state = { ...state, ...snap.data() }; render(); renderScout(); }
    });

    window.sync = async () => await setDoc(doc(db, "gestao", "atual"), state);

    window.track = (campo) => {
        if(!selectedAtleta) return alert("Selecione a atleta!");
        if(!state.estats[selectedAtleta]) state.estats[selectedAtleta] = {};
        state.estats[selectedAtleta][campo] = (state.estats[selectedAtleta][campo] || 0) + 1;
        sync(); renderScout();
    };

    function renderScout() {
        const lista = document.getElementById('lista-atletas-scout');
        lista.innerHTML = state.atletas.map(a => `
            <div onclick="selectedAtleta=${a.n}; document.getElementById('atleta-selecionada-nome').innerText='Scout: ${a.nome}'" style="padding:10px; background:#1e293b; border-radius:8px;">${a.n}</div>
        `).join('');
        
        const body = document.getElementById('stats-body');
        body.innerHTML = state.atletas.map(a => {
            const s = state.estats[a.n] || {};
            return `<tr><td>${a.nome}</td><td>${s['s+']||0}</td><td>${s['s-']||0}</td><td>${s['ace']||0}</td><td>${s['atk+']||0}</td><td>${s['atk-']||0}</td></tr>`;
        }).join('');
    }

    // ... MANTENHA SUAS OUTRAS FUNCOES ORIGINAIS AQUI (gerarMensagem, addAthlete, etc) ...

    window.showTab = (tab) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(tab).classList.add('active');
    };
    window.checkPass = () => { if(document.getElementById('passInput').value === 'volei2026') { document.getElementById('login-screen').style.display='none'; } };
    
</script>
</body>
</html>
